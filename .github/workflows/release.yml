name: Build & Release

# Build Bi-Code for Windows, Linux and macOS — both x86_64 and ARM64.
# Publish a GitHub release and this workflow builds the installers and
# attaches them to that same (latest) release;
# or run manually (workflow_dispatch) to just get build artifacts.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x86_64,   os: ubuntu-22.04,      target: x86_64-unknown-linux-gnu }
          - { name: linux-arm64,    os: ubuntu-24.04-arm,  target: aarch64-unknown-linux-gnu }
          - { name: windows-x86_64, os: windows-latest,    target: x86_64-pc-windows-msvc }
          - { name: windows-arm64,  os: windows-11-arm,    target: aarch64-pc-windows-msvc }
          - { name: macos-x86_64,   os: macos-13,          target: x86_64-apple-darwin }
          - { name: macos-arm64,    os: macos-14,          target: aarch64-apple-darwin }

    steps:
      - uses: actions/checkout@v4

      # ---- Linux system dependencies (webkit2gtk etc.) ----
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      # ---- Windows: tools needed to build vendored OpenSSL (ssh2) ----
      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1
      - name: Install Strawberry Perl (Windows)
        if: runner.os == 'Windows'
        run: choco install -y strawberryperl

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}
          # Upload the installers as assets of the release that triggered this
          # run. Empty on workflow_dispatch -> just builds artifacts, no upload.
          releaseId: ${{ github.event.release.id }}

      # ---- Linux: ship a raw "binary + ui" tarball (for /opt installs) ----
      # The UI is embedded in the binary, but ui/ is included for reference.
      - name: Package binary + ui (Linux)
        if: runner.os == 'Linux' && github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          REL="src-tauri/target/${{ matrix.target }}/release"
          BIN=""
          for c in "Bi-Code" "editor-ide"; do
            [ -x "$REL/$c" ] && { BIN="$REL/$c"; break; }
          done
          [ -n "$BIN" ] || { echo "binary not found in $REL"; ls -la "$REL"; exit 1; }
          STAGE="Bi-Code"
          rm -rf "$STAGE" && mkdir -p "$STAGE"
          cp "$BIN" "$STAGE/bi-code" && chmod +x "$STAGE/bi-code"
          cp -r ui "$STAGE/ui"
          TARBALL="Bi-Code-${{ matrix.name }}.tar.gz"
          tar -czf "$TARBALL" "$STAGE"
          gh release upload "${{ github.event.release.tag_name }}" "$TARBALL" \
            --clobber --repo "$GITHUB_REPOSITORY"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bi-code-${{ matrix.name }}
          if-no-files-found: ignore
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*
