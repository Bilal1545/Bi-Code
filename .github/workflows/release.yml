name: Build & Release

# Build Bi-Code for Windows, Linux and macOS — both x86_64 and ARM64.
# Push a tag like v0.1.0 to publish a (draft) GitHub release with installers;
# or run manually (workflow_dispatch) to just get build artifacts.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x86_64,   os: ubuntu-22.04,      target: x86_64-unknown-linux-gnu }
          - { name: linux-arm64,    os: ubuntu-24.04-arm,  target: aarch64-unknown-linux-gnu }
          - { name: windows-x86_64, os: windows-latest,    target: x86_64-pc-windows-msvc }
          - { name: windows-arm64,  os: windows-11-arm,    target: aarch64-pc-windows-msvc }
          - { name: macos-x86_64,   os: macos-13,          target: x86_64-apple-darwin }
          - { name: macos-arm64,    os: macos-14,          target: aarch64-apple-darwin }

    steps:
      - uses: actions/checkout@v4

      # ---- Linux system dependencies (webkit2gtk etc.) ----
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      # ---- Windows: tools needed to build vendored OpenSSL (ssh2) ----
      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1
      - name: Install Strawberry Perl (Windows)
        if: runner.os == 'Windows'
        run: choco install -y strawberryperl

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}
          # Create / append to a draft release only when a tag was pushed.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: "Bi-Code ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bi-code-${{ matrix.name }}
          if-no-files-found: ignore
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*
